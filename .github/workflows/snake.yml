name: generate animation

on:
  # প্রতি ২৪ ঘণ্টা পর পর অটোমেটিক আপডেট হবে
  schedule:
    - cron: "0 */24 * * *" 
  
  # ম্যানুয়ালি রান করার অপশন
  workflow_dispatch:
  
  # যখনই মেইন ব্রাঞ্চে কোনো কোড পুশ হবে তখন রান হবে
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # সাপের গেমের অ্যানিমেশন তৈরি করার স্টেপ
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ Aksad50 }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # তৈরি হওয়া ফাইলটি একটি আলাদা ব্রাঞ্চে (output) সেভ করা
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
